name: Playwright Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      test_tag:
        description: 'Test tag to run (e.g. @smoke, @navigation, @forms). Leave blank for all tests.'
        required: false
        default: ''
      site_url:
        description: 'Override target site URL (leave blank to use site.config.json)'
        required: false
        default: ''

env:
  CI: true

jobs:
  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npm run typecheck

  lint:
    name: ESLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

  test:
    name: Playwright Tests
    runs-on: ubuntu-latest
    needs: [typecheck]
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        project: [chromium-desktop, mobile-chrome, tablet]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: |
          if [ -n "${{ github.event.inputs.test_tag }}" ]; then
            npx playwright test --grep "${{ github.event.inputs.test_tag }}" --project=${{ matrix.project }}
          else
            npx playwright test --project=${{ matrix.project }} --grep-invert "@visual"
          fi
        env:
          SITE_URL: ${{ github.event.inputs.site_url || '' }}

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-results-${{ matrix.project }}
          path: |
            test-results/
            playwright-report/
          retention-days: 7

  smoke-check:
    name: Smoke Tests (all browsers)
    runs-on: ubuntu-latest
    needs: [typecheck]
    timeout-minutes: 10
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run smoke tests
        run: npm run test:smoke

      - name: Upload smoke results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: smoke-results
          path: playwright-report/
          retention-days: 3
